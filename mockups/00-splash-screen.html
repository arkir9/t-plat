<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>plat - Splash Screen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .logo {
            font-size: 80px;
            font-weight: 300;
            font-style: italic;
            letter-spacing: 2px;
            margin-bottom: 60px;
            opacity: 0;
            animation: fadeIn 0.6s ease-in forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .ticket-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin-bottom: 40px;
        }

        .ticket {
            position: absolute;
            width: 80px;
            height: 100px;
            background: linear-gradient(135deg, #8B5CF6 0%, #7C3AED 100%);
            border-radius: 12px;
            opacity: 0;
            animation: floatUp 3s ease-in-out infinite;
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4);
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .ticket::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 3px solid white;
            border-radius: 6px;
        }

        .ticket::after {
            content: '';
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
        }

        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translate(-50%, -30%) scale(0.8);
            }
            20% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                transform: translate(-50%, -70%) scale(1.05);
            }
            80% {
                opacity: 1;
                transform: translate(-50%, -90%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -120%) scale(0.9);
            }
        }

        .loading-text {
            margin-top: 20px;
            font-size: 14px;
            color: #999999;
            opacity: 0;
            animation: fadeIn 1s ease-in 1.2s forwards;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(139, 92, 246, 0.3);
            border-top-color: #8B5CF6;
            border-radius: 50%;
            margin: 20px auto;
            opacity: 0;
            animation: fadeIn 1s ease-in 1.5s forwards, spin 1s linear infinite 1.5s;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="logo">plat</div>
    <div class="ticket-container">
        <div class="ticket"></div>
    </div>
    <div class="spinner"></div>
    <div class="loading-text">Loading...</div>
</body>
</html>
