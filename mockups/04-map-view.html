<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>plat - Map View</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: #000000;
            overflow: hidden;
            transition: background 0.3s;
        }

        body.light-mode {
            background: #F5F5F5;
        }

        .theme-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #FFFFFF;
            font-size: 20px;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s;
        }

        body.light-mode .theme-toggle {
            background: rgba(0, 0, 0, 0.1);
            color: #000000;
        }

        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
            transition: background 0.3s;
        }

        body.light-mode .header {
            background: rgba(255, 255, 255, 0.95);
        }

        .logo {
            font-size: 28px;
            font-weight: 300;
            font-style: italic;
            color: #FFFFFF;
            transition: color 0.3s;
        }

        body.light-mode .logo {
            color: #000000;
        }

        .location {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            transition: color 0.3s;
        }

        body.light-mode .location {
            color: #666666;
        }

        .search-icon {
            width: 24px;
            height: 24px;
            cursor: pointer;
        }

        .map-container {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .map-placeholder {
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            text-align: center;
        }

        .user-location {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #3B82F6;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.3);
            }
            50% {
                box-shadow: 0 0 0 8px rgba(59, 130, 246, 0.1);
            }
        }

        .event-marker {
            position: absolute;
            width: 32px;
            height: 32px;
            background: #8B5CF6;
            border: 3px solid white;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .event-marker:hover {
            transform: scale(1.2);
        }

        .event-marker::before {
            content: '🎫';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
        }

        .cluster-marker {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #000000;
            border: 3px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .filters-overlay {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            z-index: 10;
            transition: background 0.3s;
        }

        body.light-mode .filters-overlay {
            background: rgba(255, 255, 255, 0.9);
        }

        .filter-chip {
            padding: 8px 16px;
            border-radius: 16px;
            font-size: 14px;
            white-space: nowrap;
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        body.light-mode .filter-chip {
            background: #E5E5E5;
            color: #1A1A1A;
        }

        .filter-chip.active {
            background: #8B5CF6;
            color: #FFFFFF;
        }

        .map-controls {
            position: absolute;
            bottom: 200px;
            right: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }

        .control-btn {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s;
        }

        body.light-mode .control-btn {
            background: #FFFFFF;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .preview-sheet {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px 20px 0 0;
            padding: 16px;
            max-height: 40vh;
            z-index: 20;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
            transition: background 0.3s;
        }

        body.light-mode .preview-sheet {
            background: #FFFFFF;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
        }

        .sheet-handle {
            width: 40px;
            height: 4px;
            background: #CCCCCC;
            border-radius: 2px;
            margin: 0 auto 16px;
        }

        .preview-content {
            display: flex;
            gap: 12px;
        }

        .preview-image {
            width: 120px;
            height: 80px;
            border-radius: 8px;
            background: linear-gradient(135deg, #8B5CF6 0%, #000000 100%);
        }

        .preview-info {
            flex: 1;
        }

        .preview-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #FFFFFF;
            transition: color 0.3s;
        }

        body.light-mode .preview-title {
            color: #000000;
        }

        .preview-meta {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
            transition: color 0.3s;
        }

        body.light-mode .preview-meta {
            color: #666666;
        }

        .preview-price {
            font-size: 16px;
            font-weight: 700;
            color: #FFFFFF;
            transition: color 0.3s;
        }

        body.light-mode .preview-price {
            color: #000000;
        }

        .preview-btn {
            width: 100%;
            height: 48px;
            background: #8B5CF6;
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        body.light-mode .preview-btn {
            background: #000000;
        }

        .toggle-view-btn {
            position: absolute;
            top: 100px;
            right: 16px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            z-index: 10;
            color: #FFFFFF;
            transition: all 0.3s;
        }

        body.light-mode .toggle-view-btn {
            background: #FFFFFF;
            border-color: #E5E5E5;
            color: #000000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            height: 60px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0;
            z-index: 30;
            transition: all 0.3s;
        }

        body.light-mode .tab-bar {
            background: #FFFFFF;
            border-top-color: #E5E5E5;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            flex: 1;
        }

        .tab-icon {
            width: 24px;
            height: 24px;
            color: rgba(255, 255, 255, 0.6);
            transition: color 0.3s;
        }

        body.light-mode .tab-icon {
            color: #999999;
        }

        .tab-item.active .tab-icon {
            color: #8B5CF6;
        }

        .tab-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
            transition: color 0.3s;
        }

        body.light-mode .tab-label {
            color: #999999;
        }

        .tab-item.active .tab-label {
            color: #8B5CF6;
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    <div class="header">
        <div class="logo">plat</div>
        <div class="location">📍 Nairobi, Kenya</div>
        <div class="search-icon">🔍</div>
    </div>

    <div class="filters-overlay">
        <button class="filter-chip active">Today</button>
        <button class="filter-chip">This Weekend</button>
        <button class="filter-chip">Free Events</button>
        <button class="filter-chip">Music</button>
    </div>

    <button class="toggle-view-btn">📋 List View</button>

    <div class="map-container">
        <div class="map-placeholder">Map View<br><small style="font-size: 14px;">Google Maps / Mapbox Integration</small></div>
        
        <!-- User Location -->
        <div class="user-location" style="top: 50%; left: 50%;"></div>
        
        <!-- Event Markers -->
        <div class="event-marker" style="top: 30%; left: 45%;"></div>
        <div class="event-marker" style="top: 40%; left: 55%;"></div>
        <div class="event-marker" style="top: 60%; left: 50%;"></div>
        <div class="cluster-marker" style="top: 25%; left: 60%;">5</div>
    </div>

    <div class="map-controls">
        <button class="control-btn">📍</button>
        <button class="control-btn">➕</button>
        <button class="control-btn">➖</button>
    </div>

    <div class="preview-sheet">
        <div class="sheet-handle"></div>
        <div class="preview-content">
            <div class="preview-image"></div>
            <div class="preview-info">
                <h3 class="preview-title">Nairobi Music Festival</h3>
                <div class="preview-meta">📅 Today, 7:00 PM</div>
                <div class="preview-meta">📍 Kasarani Stadium</div>
                <div class="preview-price">From KES 1,500</div>
            </div>
        </div>
        <button class="preview-btn">View Details</button>
    </div>

    <div class="tab-bar">
        <div class="tab-item active">
            <div class="tab-icon">🏠</div>
            <div class="tab-label">Home</div>
        </div>
        <div class="tab-item active">
            <div class="tab-icon">🗺️</div>
            <div class="tab-label">Map</div>
        </div>
        <div class="tab-item">
            <div class="tab-icon">🎫</div>
            <div class="tab-label">Tickets</div>
        </div>
        <div class="tab-item">
            <div class="tab-icon">❤️</div>
            <div class="tab-label">Favorites</div>
        </div>
        <div class="tab-item">
            <div class="tab-icon">👤</div>
            <div class="tab-label">Profile</div>
        </div>
    </div>
    <script>
        let isDark = true;
        function toggleTheme() {
            isDark = !isDark;
            document.body.classList.toggle('light-mode');
            document.querySelector('.theme-toggle').innerHTML = isDark ? '🌙' : '☀️';
        }
    </script>
</body>
</html>
