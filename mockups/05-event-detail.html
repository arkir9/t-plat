<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>plat - Event Detail</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: #000000;
            color: #FFFFFF;
            padding-bottom: 80px;
            transition: background 0.3s, color 0.3s;
        }

        body.light-mode {
            background: #FFFFFF;
            color: #1A1A1A;
        }

        .theme-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #FFFFFF;
            font-size: 20px;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s;
        }

        body.light-mode .theme-toggle {
            background: rgba(0, 0, 0, 0.1);
            color: #000000;
        }

        .header {
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
            transition: background 0.3s;
        }

        body.light-mode .header {
            background: rgba(255, 255, 255, 0.95);
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            font-size: 24px;
            cursor: pointer;
            color: #FFFFFF;
            transition: color 0.3s;
        }

        body.light-mode .back-btn {
            color: #000000;
        }

        .logo {
            font-size: 24px;
            font-weight: 300;
            font-style: italic;
            color: #FFFFFF;
            transition: color 0.3s;
        }

        body.light-mode .logo {
            color: #000000;
        }

        .share-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            font-size: 20px;
            cursor: pointer;
            color: #FFFFFF;
            transition: color 0.3s;
        }

        body.light-mode .share-btn {
            color: #000000;
        }

        .hero-image {
            width: 100%;
            height: 250px;
            background: linear-gradient(135deg, #8B5CF6 0%, #000000 100%);
            position: relative;
        }

        .favorite-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .content {
            padding: 24px 16px;
        }

        .event-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #FFFFFF;
            transition: color 0.3s;
        }

        body.light-mode .event-title {
            color: #1A1A1A;
        }

        .organizer-link {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 24px;
            transition: color 0.3s;
        }

        body.light-mode .organizer-link {
            color: #666666;
        }

        .details-section {
            margin-bottom: 24px;
        }

        .detail-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 16px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            transition: background 0.3s;
        }

        body.light-mode .detail-item {
            background: #F5F5F5;
        }

        .detail-icon {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }

        .detail-content {
            flex: 1;
        }

        .detail-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 4px;
            transition: color 0.3s;
        }

        body.light-mode .detail-label {
            color: #666666;
        }

        .detail-value {
            font-size: 16px;
            font-weight: 600;
            color: #FFFFFF;
            transition: color 0.3s;
        }

        body.light-mode .detail-value {
            color: #000000;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #FFFFFF;
            transition: color 0.3s;
        }

        body.light-mode .section-title {
            color: #1A1A1A;
        }

        .description-text {
            font-size: 16px;
            line-height: 24px;
            color: rgba(255, 255, 255, 0.8);
            transition: color 0.3s;
        }

        body.light-mode .description-text {
            color: #1A1A1A;
        }

        .ticket-type-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.3s;
        }

        body.light-mode .ticket-type-card {
            background: #F5F5F5;
            border-color: #E5E5E5;
        }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .ticket-name {
            font-size: 18px;
            font-weight: 700;
            color: #FFFFFF;
            transition: color 0.3s;
        }

        body.light-mode .ticket-name {
            color: #1A1A1A;
        }

        .ticket-price {
            font-size: 20px;
            font-weight: 700;
            color: #8B5CF6;
        }

        .ticket-desc {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 12px;
            transition: color 0.3s;
        }

        body.light-mode .ticket-desc {
            color: #666666;
        }

        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .qty-btn {
            width: 36px;
            height: 36px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 20px;
            cursor: pointer;
            color: #FFFFFF;
            transition: all 0.3s;
        }

        body.light-mode .qty-btn {
            border-color: #E5E5E5;
            background: #FFFFFF;
            color: #1A1A1A;
        }

        .qty-value {
            font-size: 18px;
            font-weight: 600;
            min-width: 30px;
            text-align: center;
            color: #FFFFFF;
            transition: color 0.3s;
        }

        body.light-mode .qty-value {
            color: #1A1A1A;
        }

        .total-bar {
            position: fixed;
            bottom: 60px;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            transition: all 0.3s;
        }

        body.light-mode .total-bar {
            background: #FFFFFF;
            border-top-color: #E5E5E5;
        }

        .buy-btn {
            width: 100%;
            height: 56px;
            background: #8B5CF6;
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
        }

        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            height: 60px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0;
            transition: all 0.3s;
        }

        body.light-mode .tab-bar {
            background: #FFFFFF;
            border-top-color: #E5E5E5;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            flex: 1;
        }

        .tab-icon {
            width: 24px;
            height: 24px;
            color: rgba(255, 255, 255, 0.6);
            transition: color 0.3s;
        }

        body.light-mode .tab-icon {
            color: #999999;
        }

        .tab-item.active .tab-icon {
            color: #8B5CF6;
        }

        .tab-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
            transition: color 0.3s;
        }

        body.light-mode .tab-label {
            color: #999999;
        }

        .tab-item.active .tab-label {
            color: #8B5CF6;
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    
    <div class="header">
        <button class="back-btn">←</button>
        <div class="logo">plat</div>
        <button class="share-btn">↗</button>
    </div>

    <div class="hero-image">
        <button class="favorite-btn">🤍</button>
    </div>

    <div class="content">
        <h1 class="event-title">Nairobi Music Festival 2024</h1>
        <a href="#" class="organizer-link">by Nairobi Events Co. →</a>

        <div class="details-section">
            <div class="detail-item">
                <div class="detail-icon">📅</div>
                <div class="detail-content">
                    <div class="detail-label">Date & Time</div>
                    <div class="detail-value">Today, December 15, 2024<br>7:00 PM - 11:00 PM</div>
                </div>
            </div>
        </div>

        <div>
            <h2 class="section-title">About this event</h2>
            <p class="description-text">Join us for the biggest music festival in Nairobi!</p>
        </div>

        <div>
            <h2 class="section-title">Select Tickets</h2>
            <div class="ticket-type-card">
                <div class="ticket-header">
                    <div class="ticket-name">General Admission</div>
                    <div class="ticket-price">KES 1,500</div>
                </div>
                <div class="ticket-desc">Standard entry to the festival</div>
                <div class="quantity-selector">
                    <button class="qty-btn">−</button>
                    <span class="qty-value">0</span>
                    <button class="qty-btn">+</button>
                </div>
            </div>
        </div>
    </div>

    <div class="total-bar">
        <button class="buy-btn">Buy Tickets</button>
    </div>

    <div class="tab-bar">
        <div class="tab-item active">
            <div class="tab-icon">🏠</div>
            <div class="tab-label">Home</div>
        </div>
        <div class="tab-item">
            <div class="tab-icon">🎫</div>
            <div class="tab-label">Tickets</div>
        </div>
    </div>

    <script>
        let isDark = true;
        function toggleTheme() {
            isDark = !isDark;
            document.body.classList.toggle('light-mode');
            document.querySelector('.theme-toggle').innerHTML = isDark ? '🌙' : '☀️';
        }
    </script>
</body>
</html>
