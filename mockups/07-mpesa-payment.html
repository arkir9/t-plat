<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>plat - M-Pesa Payment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: #000000;
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        body.light-mode {
            background: #FFFFFF;
            color: #1A1A1A;
        }

        .theme-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #FFFFFF;
            font-size: 20px;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s;
        }

        body.light-mode .theme-toggle {
            background: rgba(0, 0, 0, 0.1);
            color: #000000;
        }

        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 12px 16px;
            display: flex;
            align-items: center;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            font-size: 24px;
            cursor: pointer;
            color: #FFFFFF;
            transition: color 0.3s;
        }

        body.light-mode .back-btn {
            color: #000000;
        }

        .content {
            text-align: center;
            max-width: 400px;
        }

        .mpesa-logo {
            width: 80px;
            height: 80px;
            background: #00A859;
            border-radius: 16px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            box-shadow: 0 8px 24px rgba(0, 168, 89, 0.4);
        }

        .phone-number {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 16px;
            transition: color 0.3s;
        }

        body.light-mode .phone-number {
            color: #666666;
        }

        .amount {
            font-size: 48px;
            font-weight: 700;
            color: #FFFFFF;
            margin-bottom: 32px;
            transition: color 0.3s;
        }

        body.light-mode .amount {
            color: #000000;
        }

        .instructions {
            text-align: left;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 32px;
            transition: all 0.3s;
        }

        body.light-mode .instructions {
            background: #F5F5F5;
            border-color: #E5E5E5;
        }

        .instruction-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 16px;
            line-height: 24px;
        }

        .instruction-number {
            width: 28px;
            height: 28px;
            background: #8B5CF6;
            color: #FFFFFF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }

        .instruction-text {
            color: #FFFFFF;
            transition: color 0.3s;
        }

        body.light-mode .instruction-text {
            color: #1A1A1A;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(139, 92, 246, 0.3);
            border-top-color: #8B5CF6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 24px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-message {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 32px;
            transition: color 0.3s;
        }

        body.light-mode .status-message {
            color: #666666;
        }

        .cancel-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            cursor: pointer;
            text-decoration: underline;
            transition: color 0.3s;
        }

        body.light-mode .cancel-btn {
            color: #666666;
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    
    <div class="header">
        <button class="back-btn">←</button>
    </div>

    <div class="content">
        <div class="mpesa-logo">📱</div>
        <div class="phone-number">+254 7XX XXX XXX</div>
        <div class="amount">KES 3,150</div>

        <div class="instructions">
            <div class="instruction-item">
                <div class="instruction-number">1</div>
                <div class="instruction-text">Enter your M-Pesa PIN on your phone</div>
            </div>
            <div class="instruction-item">
                <div class="instruction-number">2</div>
                <div class="instruction-text">Confirm the payment when prompted</div>
            </div>
            <div class="instruction-item">
                <div class="instruction-number">3</div>
                <div class="instruction-text">Wait for payment confirmation</div>
            </div>
        </div>

        <div class="spinner"></div>
        <div class="status-message">Waiting for payment confirmation...</div>
        <button class="cancel-btn">Cancel Payment</button>
    </div>

    <script>
        let isDark = true;
        function toggleTheme() {
            isDark = !isDark;
            document.body.classList.toggle('light-mode');
            document.querySelector('.theme-toggle').innerHTML = isDark ? '🌙' : '☀️';
        }
    </script>
</body>
</html>
