<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>plat - Share Event</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: rgba(0, 0, 0, 0.5);
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            align-items: flex-end;
            transition: background 0.3s;
        }

        body.light-mode {
            background: rgba(0, 0, 0, 0.5);
        }

        .theme-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #FFFFFF;
            font-size: 20px;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s;
        }

        body.light-mode .theme-toggle {
            background: rgba(255, 255, 255, 0.9);
            color: #000000;
        }

        .modal {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-height: 70vh;
            padding: 16px;
            animation: slideUp 0.3s ease-out;
            transition: background 0.3s;
        }

        body.light-mode .modal {
            background: #FFFFFF;
            color: #1A1A1A;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .handle {
            width: 40px;
            height: 4px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 2px;
            margin: 0 auto 16px;
            transition: background 0.3s;
        }

        body.light-mode .handle {
            background: #CCCCCC;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 16px;
            color: #FFFFFF;
            transition: color 0.3s;
        }

        body.light-mode .modal-title {
            color: #1A1A1A;
        }

        .preview-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            transition: all 0.3s;
        }

        body.light-mode .preview-card {
            background: #F5F5F5;
            border-color: #E5E5E5;
        }

        .preview-image {
            width: 120px;
            height: 80px;
            border-radius: 8px;
            background: linear-gradient(135deg, #8B5CF6 0%, #000000 100%);
            flex-shrink: 0;
        }

        .preview-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
            color: #FFFFFF;
            transition: color 0.3s;
        }

        body.light-mode .preview-title {
            color: #1A1A1A;
        }

        .platform-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .platform-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        body.light-mode .platform-item {
            background: #F5F5F5;
            border-color: #E5E5E5;
        }

        .platform-item:active {
            transform: scale(0.95);
        }

        .platform-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .platform-name {
            font-size: 14px;
            font-weight: 600;
            color: #FFFFFF;
            transition: color 0.3s;
        }

        body.light-mode .platform-name {
            color: #1A1A1A;
        }

        .instagram-stories {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        .instagram-stories .platform-name {
            color: white;
        }

        .snapchat {
            background: #FFFC00;
        }

        .snapchat .platform-name {
            color: #000000;
        }

        .whatsapp {
            background: #25D366;
        }

        .whatsapp .platform-name {
            color: white;
        }

        .close-btn {
            width: 100%;
            height: 48px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: #FFFFFF;
            transition: all 0.3s;
        }

        body.light-mode .close-btn {
            background: #F5F5F5;
            border-color: #E5E5E5;
            color: #1A1A1A;
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    
    <div class="modal">
        <div class="handle"></div>
        <h2 class="modal-title">Share Event</h2>

        <div class="preview-card">
            <div class="preview-image"></div>
            <div>
                <div class="preview-title">Nairobi Music Festival</div>
                <div style="font-size: 12px; opacity: 0.7;">📅 Today, 7:00 PM</div>
                <div style="font-size: 12px; opacity: 0.7;">📍 Kasarani Stadium</div>
            </div>
        </div>

        <div class="platform-grid">
            <div class="platform-item instagram-stories">
                <div class="platform-icon">📷</div>
                <div class="platform-name">Instagram Stories</div>
            </div>
            <div class="platform-item">
                <div class="platform-icon">📷</div>
                <div class="platform-name">Instagram Feed</div>
            </div>
            <div class="platform-item snapchat">
                <div class="platform-icon">👻</div>
                <div class="platform-name">Snapchat</div>
            </div>
            <div class="platform-item whatsapp">
                <div class="platform-icon">💬</div>
                <div class="platform-name">WhatsApp</div>
            </div>
            <div class="platform-item">
                <div class="platform-icon">📋</div>
                <div class="platform-name">Copy Link</div>
            </div>
            <div class="platform-item">
                <div class="platform-icon">🔗</div>
                <div class="platform-name">Locket</div>
            </div>
        </div>

        <button class="close-btn">Close</button>
    </div>

    <script>
        let isDark = true;
        function toggleTheme() {
            isDark = !isDark;
            document.body.classList.toggle('light-mode');
            document.querySelector('.theme-toggle').innerHTML = isDark ? '🌙' : '☀️';
        }
    </script>
</body>
</html>
