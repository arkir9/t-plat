<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>plat - Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: #000000;
            color: #FFFFFF;
            padding-bottom: 80px;
            transition: background 0.3s, color 0.3s;
        }

        body.light-mode {
            background: #F5F5F5;
            color: #1A1A1A;
        }

        .theme-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #FFFFFF;
            font-size: 20px;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s;
        }

        body.light-mode .theme-toggle {
            background: rgba(0, 0, 0, 0.1);
            color: #000000;
        }

        .header {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        body.light-mode .header {
            background: #FFFFFF;
            border-bottom-color: #E5E5E5;
        }

        .header-title {
            font-size: 24px;
            font-weight: 700;
            color: #FFFFFF;
            transition: color 0.3s;
        }

        body.light-mode .header-title {
            color: #1A1A1A;
        }

        .profile-section {
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 32px 16px;
            text-align: center;
            transition: all 0.3s;
        }

        body.light-mode .profile-section {
            background: #FFFFFF;
            border-bottom-color: #E5E5E5;
        }

        .profile-image {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B5CF6 0%, #000000 100%);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        .profile-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
            color: #FFFFFF;
            transition: color 0.3s;
        }

        body.light-mode .profile-name {
            color: #1A1A1A;
        }

        .profile-email {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            transition: color 0.3s;
        }

        body.light-mode .profile-email {
            color: #666666;
        }

        .menu-section {
            background: rgba(255, 255, 255, 0.05);
            margin-top: 12px;
            border-radius: 12px;
            margin: 12px 16px;
            transition: background 0.3s;
        }

        body.light-mode .menu-section {
            background: #FFFFFF;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.2s;
        }

        body.light-mode .menu-item {
            border-bottom-color: #F5F5F5;
        }

        .menu-item:active {
            background: rgba(255, 255, 255, 0.1);
        }

        body.light-mode .menu-item:active {
            background: #F5F5F5;
        }

        .menu-icon {
            width: 24px;
            height: 24px;
            margin-right: 16px;
            font-size: 20px;
        }

        .menu-text {
            flex: 1;
            font-size: 16px;
            color: #FFFFFF;
            transition: color 0.3s;
        }

        body.light-mode .menu-text {
            color: #1A1A1A;
        }

        .menu-badge {
            background: #8B5CF6;
            color: #FFFFFF;
            font-size: 12px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 12px;
            margin-right: 8px;
        }

        .menu-arrow {
            width: 24px;
            height: 24px;
            color: rgba(255, 255, 255, 0.4);
            transition: color 0.3s;
        }

        body.light-mode .menu-arrow {
            color: #CCCCCC;
        }

        .sign-out {
            color: #EF4444;
        }

        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            height: 60px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0;
            transition: all 0.3s;
        }

        body.light-mode .tab-bar {
            background: #FFFFFF;
            border-top-color: #E5E5E5;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            flex: 1;
        }

        .tab-icon {
            width: 24px;
            height: 24px;
            color: rgba(255, 255, 255, 0.6);
            transition: color 0.3s;
        }

        body.light-mode .tab-icon {
            color: #999999;
        }

        .tab-item.active .tab-icon {
            color: #8B5CF6;
        }

        .tab-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
            transition: color 0.3s;
        }

        body.light-mode .tab-label {
            color: #999999;
        }

        .tab-item.active .tab-label {
            color: #8B5CF6;
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    
    <div class="header">
        <h1 class="header-title">Profile</h1>
    </div>

    <div class="profile-section">
        <div class="profile-image">👤</div>
        <h2 class="profile-name">John Doe</h2>
        <p class="profile-email">john.doe@example.com</p>
    </div>

    <div class="menu-section">
        <div class="menu-item">
            <div class="menu-icon">🎫</div>
            <div class="menu-text">My Tickets</div>
            <div class="menu-arrow">→</div>
        </div>
        <div class="menu-item">
            <div class="menu-icon">❤️</div>
            <div class="menu-text">Favorites</div>
            <div class="menu-arrow">→</div>
        </div>
        <div class="menu-item">
            <div class="menu-icon">⏰</div>
            <div class="menu-text">Waitlist</div>
            <span class="menu-badge">2</span>
            <div class="menu-arrow">→</div>
        </div>
        <div class="menu-item">
            <div class="menu-icon">⚙️</div>
            <div class="menu-text">Settings</div>
            <div class="menu-arrow">→</div>
        </div>
        <div class="menu-item sign-out">
            <div class="menu-icon">🚪</div>
            <div class="menu-text">Sign Out</div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item">
            <div class="tab-icon">🏠</div>
            <div class="tab-label">Home</div>
        </div>
        <div class="tab-item">
            <div class="tab-icon">🗺️</div>
            <div class="tab-label">Map</div>
        </div>
        <div class="tab-item">
            <div class="tab-icon">🎫</div>
            <div class="tab-label">Tickets</div>
        </div>
        <div class="tab-item">
            <div class="tab-icon">❤️</div>
            <div class="tab-label">Favorites</div>
        </div>
        <div class="tab-item active">
            <div class="tab-icon">👤</div>
            <div class="tab-label">Profile</div>
        </div>
    </div>

    <script>
        let isDark = true;
        function toggleTheme() {
            isDark = !isDark;
            document.body.classList.toggle('light-mode');
            document.querySelector('.theme-toggle').innerHTML = isDark ? '🌙' : '☀️';
        }
    </script>
</body>
</html>
