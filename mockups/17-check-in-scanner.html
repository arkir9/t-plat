<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>plat - Check In</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: #000000;
            color: #FFFFFF;
            overflow: hidden;
        }

        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            font-size: 24px;
            cursor: pointer;
            color: #FFFFFF;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
        }

        .event-name {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        .camera-view {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .scanner-frame {
            width: 280px;
            height: 280px;
            border: 3px solid #8B5CF6;
            border-radius: 16px;
            position: relative;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
        }

        .scanner-frame::before,
        .scanner-frame::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border: 4px solid #8B5CF6;
        }

        .scanner-frame::before {
            top: -4px;
            left: -4px;
            border-right: none;
            border-bottom: none;
            border-top-left-radius: 12px;
        }

        .scanner-frame::after {
            bottom: -4px;
            right: -4px;
            border-left: none;
            border-top: none;
            border-bottom-right-radius: 12px;
        }

        .scanner-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #8B5CF6, transparent);
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% {
                top: 0;
            }
            100% {
                top: 100%;
            }
        }

        .instructions {
            position: absolute;
            bottom: 120px;
            left: 0;
            right: 0;
            text-align: center;
            padding: 0 20px;
        }

        .instruction-text {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 8px;
        }

        .instruction-subtext {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .bottom-sheet {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px 20px 0 0;
            padding: 16px;
            max-height: 40vh;
        }

        .sheet-handle {
            width: 40px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            margin: 0 auto 16px;
        }

        .manual-entry-btn {
            width: 100%;
            height: 48px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #FFFFFF;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .checked-in-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .list-title {
            font-size: 16px;
            font-weight: 700;
        }

        .checked-in-count {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .attendee-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .attendee-name {
            flex: 1;
            font-size: 14px;
            font-weight: 600;
        }

        .check-in-time {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn">←</button>
        <div>
            <div class="header-title">Check In</div>
            <div class="event-name">Nairobi Music Festival</div>
        </div>
        <div style="width: 40px;"></div>
    </div>

    <div class="camera-view">
        <div class="scanner-frame">
            <div class="scanner-line"></div>
        </div>
        <div class="instructions">
            <div class="instruction-text">Point camera at ticket QR code</div>
            <div class="instruction-subtext">Make sure the QR code is clearly visible</div>
        </div>
    </div>

    <div class="bottom-sheet">
        <div class="sheet-handle"></div>
        <button class="manual-entry-btn">Enter Ticket Number Manually</button>
        <div class="checked-in-list">
            <div class="list-header">
                <div class="list-title">Checked In</div>
                <div class="checked-in-count">12 / 150</div>
            </div>
            <div class="attendee-item">
                <div class="attendee-name">John Doe</div>
                <div class="check-in-time">2 min ago</div>
            </div>
            <div class="attendee-item">
                <div class="attendee-name">Jane Smith</div>
                <div class="check-in-time">5 min ago</div>
            </div>
            <div class="attendee-item">
                <div class="attendee-name">Mike Johnson</div>
                <div class="check-in-time">8 min ago</div>
            </div>
        </div>
    </div>
</body>
</html>
